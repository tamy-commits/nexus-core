services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      VITE_NEXUS_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - api
